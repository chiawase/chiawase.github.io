<div class="heading-card">
  <img src="{% link assets/chi.png %}" alt="" class="my-photo">
  <div class="card-info">
    <h1>{{ site.title }}</h1>
    <p class="tagline">{{ site.tagline }}</p>
    {% if site.data.social-media-links %}
      <div class="links">
      {% for link in site.data.social-media-links %}
        <a href="{{ link.url }}" class="link" title="{{ link.title }}" target="_blank">{{ link.iconify }}</a>
      {% endfor %}
      </div>
    {% endif %}
  </div>
</div>
