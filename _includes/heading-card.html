<div class="heading-card">
  <img src="{% link assets/chi.png %}" alt="" class="card">
  <div class="card-info">
    <h1>{{ site.title }}</h1>
    <p class="tagline">{{ site.tagline }}</p>
    <div class="social-media-links">
      {% if site.data.social-media-links %}
        <p class="links">
        {% for link in site.data.social-media-links %}
          <a href="{{ link.url }}" class="{{ link.title }}" title="{{ link.title }}">{{ link.iconify }}</a>
        {% endfor %}
        </p>
      {% endif %}
    </div>
  </div>
</div>
